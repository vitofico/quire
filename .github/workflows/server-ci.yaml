name: server-ci

on:
  push:
    paths:
      - "server/**"
      - ".github/workflows/server-ci.yaml"
      - "core/identity/src/test/resources/identity/**"
  pull_request:
    paths:
      - "server/**"
      - ".github/workflows/server-ci.yaml"
      - "core/identity/src/test/resources/identity/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Set up Python
        run: uv python install 3.12
      - name: Install
        run: |
          uv venv
          uv pip install -e ".[dev]"
      - name: Lint
        run: uv run ruff check . && uv run ruff format --check .
      - name: Test
        run: uv run pytest -v

  image:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: server
          push: true
          sbom: true
          provenance: mode=max
          tags: |
            ghcr.io/${{ github.repository_owner }}/opds-sync:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/opds-sync:latest

  scan:
    needs: image
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/opds-sync:${{ github.sha }}
          format: sarif
          output: trivy.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif
