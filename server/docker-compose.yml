services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: quire_server
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: quire_server
    volumes:
      - quire_server_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quire_server"]
      interval: 5s
      timeout: 5s
      retries: 10

  opds-sync:
    image: ghcr.io/vitofico/opds-sync:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      OPDS_SYNC_DATABASE_URL: postgresql+asyncpg://quire_server:${POSTGRES_PASSWORD:-changeme}@postgres:5432/quire_server
      OPDS_SYNC_CWA_BASE_URL: ${OPDS_SYNC_CWA_BASE_URL}
      OPDS_SYNC_LOG_LEVEL: ${OPDS_SYNC_LOG_LEVEL:-INFO}
    ports:
      - "${OPDS_SYNC_PORT:-8000}:8000"
    command: >
      sh -c "python /app/scripts/migrate.py &&
             uvicorn quire_server.main:app --host 0.0.0.0 --port 8000"

volumes:
  quire_server_pg:
